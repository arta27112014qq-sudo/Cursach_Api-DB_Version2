<!doctype html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Отчеты | LAN Admin</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <h1>LAN Admin</h1>
      <nav class="menu">
        <a class="menu-link active" href="reports.html">Отчеты</a>
        <a class="menu-link" href="booking.html">Бронирование</a>
        <a class="menu-link" href="pcs.html">Управление PC</a>
        <a class="menu-link" href="fridge.html">Запасы холодильника</a>
        <a class="menu-link" href="sales.html">Продажи еды и пополнение</a>
        <a class="menu-link" href="diagram.html">Диаграмма платежей</a>
      </nav>
    </aside>
    <main class="content">
      <h2>Отчеты за день</h2>
      <div class="cards">
        <article class="card">
          <p>Аренда PC</p>
          <h3 id="pcRevenueTotal">0 ₽</h3>
        </article>
        <article class="card">
          <p>Продажи еды и пополнение</p>
          <h3 id="fridgeRevenueTotal">0 ₽</h3>
        </article>
        <article class="card">
          <p>Итого за день</p>
          <h3 id="dayTotal">0 ₽</h3>
        </article>
      </div>
      <div class="panel">
        <h3>Данные дневной выручки</h3>
        <form id="revenueForm" class="report-form">
          <label>
            Аренда PC наличными (₽)
            <input id="pcRevenueCashInput" type="number" min="0" step="100" value="0" readonly />
          </label>
          <label>
            Аренда PC картой (₽)
            <input id="pcRevenueCardInput" type="number" min="0" step="100" value="0" readonly />
          </label>
          <label>
            Продажи холодильника наличными (₽)
            <input id="fridgeRevenueCashInput" type="number" min="0" step="50" value="0" readonly />
          </label>
          <label>
            Продажи холодильника картой (₽)
            <input id="fridgeRevenueCardInput" type="number" min="0" step="50" value="0" readonly />
          </label>
        </form>
      </div>
    </main>
  </div>
  <script src="scripts/reports.js" type="module"></script>
</body>

</html>
