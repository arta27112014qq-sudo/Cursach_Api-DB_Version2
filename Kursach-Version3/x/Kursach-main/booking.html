      <h2>Бронирование</h2>
      <p class="hint">1 клетка = 30 минут. Таблица строится на 4 дня вперед.</p>
      <div class="panel booking-panel">
        <div class="booking-slider-wrap">
          <label for="bookingScroll" class="hint">Прокрутка таблицы</label>
          <input id="bookingScroll" class="booking-scroll" type="range" min="0" max="0" value="0" step="1" />
        </div>
        <div id="bookingGrid" class="booking-grid booking-window"></div>
      </div>
